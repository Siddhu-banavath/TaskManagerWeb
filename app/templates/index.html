<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Task Manager</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Team Task Manager</h1>

    <section id="auth-section" class="card">
      <h2>Authentication</h2>
      <div class="two-col">
        <form id="signup-form">
          <h3>Signup</h3>
          <input name="full_name" placeholder="Full name" required />
          <input name="email" type="email" placeholder="Email" required />
          <input name="password" type="password" placeholder="Password" required />
          <select name="global_role">
            <option value="member">Member</option>
            <option value="admin">Admin</option>
          </select>
          <button type="submit">Create account</button>
        </form>

        <form id="login-form">
          <h3>Login</h3>
          <input name="email" type="email" placeholder="Email" required />
          <input name="password" type="password" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>
      </div>
    </section>

    <section id="app-section" class="hidden">
      <div class="card">
        <p id="current-user"></p>
        <button id="logout-btn" class="secondary">Logout</button>
      </div>

      <section class="dashboard-grid">
        <article class="card"><h3>Total</h3><p id="total_tasks">0</p></article>
        <article class="card"><h3>Todo</h3><p id="todo_tasks">0</p></article>
        <article class="card"><h3>In Progress</h3><p id="in_progress_tasks">0</p></article>
        <article class="card"><h3>Done</h3><p id="done_tasks">0</p></article>
        <article class="card"><h3>Overdue</h3><p id="overdue_tasks">0</p></article>
        <article class="card"><h3>My Open</h3><p id="my_open_tasks">0</p></article>
      </section>

      <section class="two-col">
        <form id="project-form" class="card">
          <h2>Create Project (Admin)</h2>
          <input name="name" placeholder="Project name" required />
          <textarea name="description" placeholder="Description"></textarea>
          <button type="submit">Create Project</button>
        </form>

        <form id="member-form" class="card">
          <h2>Add/Update Member</h2>
          <input name="project_id" type="number" placeholder="Project ID" required />
          <input name="user_id" type="number" placeholder="User ID" required />
          <select name="role">
            <option value="member">Member</option>
            <option value="admin">Admin</option>
          </select>
          <button type="submit">Save Member</button>
        </form>
      </section>

      <section class="two-col">
        <form id="task-form" class="card">
          <h2>Create Task</h2>
          <input name="project_id" type="number" placeholder="Project ID" required />
          <input name="title" placeholder="Task title" required />
          <textarea name="description" placeholder="Description"></textarea>
          <input name="assignee_id" type="number" placeholder="Assignee User ID (optional)" />
          <input name="due_date" type="date" />
          <button type="submit">Create Task</button>
        </form>

        <form id="status-form" class="card">
          <h2>Update Task Status</h2>
          <input name="task_id" type="number" placeholder="Task ID" required />
          <select name="status">
            <option value="todo">Todo</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
          <button type="submit">Update Status</button>
        </form>
      </section>

      <section class="card">
        <h2>Projects</h2>
        <button id="refresh-projects">Refresh Projects</button>
        <ul id="project-list"></ul>
      </section>

      <section class="card">
        <h2>My Tasks</h2>
        <button id="refresh-tasks">Refresh Tasks</button>
        <ul id="task-list"></ul>
      </section>
    </section>

    <p id="message"></p>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
